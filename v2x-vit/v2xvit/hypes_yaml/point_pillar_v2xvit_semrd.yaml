# SemRD-V2X Configuration
#
# This is a v2x-vit v1 yaml with the new 'semrd' section added.
# All other fields are identical to the baseline point_pillar_v2xvit.yaml
# (see d:/tmp/v2x-vit/v2xvit/hypes_yaml/point_pillar_v2xvit.yaml).
#
# Place this file at:  v2xvit/hypes_yaml/point_pillar_v2xvit_semrd.yaml
# Run training with:   python v2xvit/tools/train_semrd.py \
#                         --hypes_yaml v2xvit/hypes_yaml/point_pillar_v2xvit_semrd.yaml

name: point_pillar_v2xvit_semrd
# root_dir: 'v2xset/train'
# validate_dir: 'v2xset/validate'
root_dir: '/root/autodl-tmp/v2xset/train' 
validate_dir: '/root/autodl-tmp/v2xset/validate'

wild_setting:
  async: false
  async_mode: 'sim'
  async_overhead: 100
  seed: 25
  loc_err: false
  xyz_std: 0.2
  ryp_std: 0.2
  data_size: 1.06 # Mb!!
  transmission_speed: 27 # Mbps!!
  backbone_delay: 10 # ms

yaml_parser: "load_point_pillar_params"
train_params:
  batch_size: &batch_size 2
  epoches: 30
  eval_freq: 1
  save_freq: 1
  max_cav: &max_cav 5
  num_workers: 20    # 0 to avoid shared memory issues; raise to 4-8 if /dev/shm is large enough

fusion:
  core_method: 'IntermediateFusionDataset'
  args:
    cur_ego_pose_flag: False

# preprocess-related
preprocess:
  core_method: 'SpVoxelPreprocessor'
  args:
    voxel_size: &voxel_size [0.4, 0.4, 4]
    max_points_per_voxel: 32
    max_voxel_train: 32000
    max_voxel_test: 70000
  cav_lidar_range: &cav_lidar [-140.8, -38.4, -3, 140.8, 38.4, 1]

data_augment:
  - NAME: random_world_flip
    ALONG_AXIS_LIST: [ 'x' ]
  - NAME: random_world_rotation
    WORLD_ROT_ANGLE: [ -0.78539816, 0.78539816 ]
  - NAME: random_world_scaling
    WORLD_SCALE_RANGE: [ 0.95, 1.05 ]

# anchor box related
postprocess:
  core_method: 'VoxelPostprocessor'
  anchor_args:
    cav_lidar_range: *cav_lidar
    l: 3.9
    w: 1.6
    h: 1.56
    r: [0, 90]
    feature_stride: 4
    num: &achor_num 2
  target_args:
    pos_threshold: 0.6
    neg_threshold: 0.45
    score_threshold: 0.27
  order: 'hwl'
  max_num: 100
  nms_thresh: 0.15

# model related — uses our new point_pillar_v2xvit_semrd class
model:
  core_method: point_pillar_v2xvit_semrd
  args:
    voxel_size: *voxel_size
    lidar_range: *cav_lidar
    anchor_number: *achor_num
    max_cav: *max_cav
    compression: 0
    backbone_fix: false

    # ===== SemRD-V2X specific configuration =====
    semrd:
      enabled: true
      # Target fraction of BEV positions selected as "core" (P_A).
      # Valid range: (0, 1]. 1.0 = no compression (degenerate to baseline V2X-ViT).
      target_core_mass: 0.5
      # Number of stacked diffusion layers in the inference module (δ).
      # 0 = disable IM (no closure reconstruction).
      inference_depth: 5
      # Rate regularization weight (λ in main.tex Eq. 34). 0 disables RR.
      lambda_rate: 0.05
      use_rate_reg: true
      # Gumbel-Softmax annealing schedule (start hot, end sharp)
      gumbel_temperature_init: 5.0
      gumbel_temperature_end: 0.5
      # Score MLP architecture
      metadata_dim: 5
      score_mlp_hidden: 128

    pillar_vfe:
      use_norm: true
      with_distance: false
      use_absolute_xyz: true
      num_filters: [64]
    point_pillar_scatter:
      num_features: 64

    base_bev_backbone:
      layer_nums: [3, 5, 8]
      layer_strides: [2, 2, 2]
      num_filters: [64, 128, 256]
      upsample_strides: [1, 2, 4]
      num_upsample_filter: [128, 128, 128]
    shrink_header:
      kernal_size: [3]
      stride: [2]
      padding: [1]
      dim: [256]
      input_dim: 384

    transformer:
      encoder: &encoder
        num_blocks: 1
        depth: 3
        use_roi_mask: true
        use_RTE: &use_RTE true
        RTE_ratio: &RTE_ratio 2
        cav_att_config: &cav_att_config
          dim: 256
          use_hetero: true
          use_RTE: *use_RTE
          RTE_ratio: *RTE_ratio
          heads: 8
          dim_head: 32
          dropout: 0.3
        pwindow_att_config: &pwindow_att_config
          dim: 256
          heads: [16, 8, 4]
          dim_head: [16, 32, 64]
          dropout: 0.3
          window_size: [4, 8, 16]
          relative_pos_embedding: true
          fusion_method: 'split_attn'
        feed_forward: &feed_forward
          mlp_dim: 256
          dropout: 0.3
        sttf: &sttf
          voxel_size: *voxel_size
          downsample_rate: 4

# loss
loss:
  core_method: point_pillar_loss
  args:
    cls_weight: 1.0
    reg: 2.0

optimizer:
  core_method: Adam
  lr: 0.001
  args:
    eps: 1e-10
    weight_decay: 1e-4

lr_scheduler:
  core_method: multistep
  gamma: 0.1
  step_size: [15, 50]